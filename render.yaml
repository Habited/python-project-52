databases:
  - name: task_manager
    plan: free
    databaseName: task_manager
    user: postgres

services:
  - type: web
    plan: free
    name: task_manager
    runtime: python
    buildCommand: './build.sh'
    startCommand: 'gunicorn task-task_manager.wsgi:application --log-file'
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: task_manager
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
      - key: DEBUG
        value: false
      - key: RENDER
        value: true