{% extends 'index.html' %}
{% load django_bootstrap5 %}

{% block status %}
<div class="container-lg">
    <h1>{{ title }}</h1>
    <table class="table table-striped table-borderless">
        <thead>
            <tr>
                <th scope="col">ID</th>
                <th scope="col">Имя</th>
                <th scope="col">Дата создания</th>
            </tr>
        </thead>
        
        <tbody>
        {% if statuses %}
        {% for status in statuses %}
            <tr>
                <td>{{ status.id }}</td>
                <td>{{ status.status_name }}</td>
                <td>{{ status.time_create }}</td>
                <td>
                    <a href="{% url 'update_status' status.pk %}">Изменить</a>
                    <hr>
                    <a href="{% url 'delete_status' status.pk %}">Удалить</h5>
                </td>
            </tr>
        {% endfor %}
        {% endif %}
        </tbody>
        
    </table>
</div>
{% endblock %}
