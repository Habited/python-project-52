{% extends 'index.html' %}
{% load django_bootstrap5 %}

{% block content %}
<div class="container-lg">
    <h1>{{ title }}</h1>
    <a class="btn btn-primary" href="{% url 'labels:create_label' %}">Создать метку</a>
    <table class="table table-striped table-borderless">
        <thead>
            <tr>
                <th scope="col">ID</th>
                <th scope="col">Имя</th>
                <th scope="col">Дата создания</th>
            </tr>
        </thead>
        
        <tbody>
        {% for label in labels %}
            <tr>
                <td>{{ label.id }}</td>
                <td>{{ label.label_name }}</td>
                <td>{{ label.time_create }}</td>
                <td>
                    <a href="{% url 'labels:update_label' label.pk %}">Изменить</a>
                    <br>
                    <a href="{% url 'labels:delete_label' label.pk %}">Удалить</a>
                </td>
            </tr>
        {% endfor %}
        </tbody>
        
    </table>
</div>
{% endblock %}
